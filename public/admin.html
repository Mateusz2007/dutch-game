<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dutch - Admin Panel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #1a1a2e; color: #f0f0f0;
  min-height: 100vh; padding: 24px;
}
h1 { color: #ffd700; margin-bottom: 4px; }
.subtitle { color: #888; font-size: 0.9rem; margin-bottom: 24px; }
#authError { color: #e53e3e; margin-bottom: 16px; display: none; }
#controls { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; }
#refreshBtn, .delete-btn, #backBtn {
  padding: 8px 20px; border-radius: 6px; border: none;
  cursor: pointer; font-size: 0.9rem; font-weight: bold;
}
#refreshBtn { background: #ffd700; color: #1a1a2e; }
#backBtn { background: #4a5568; color: #fff; }
.delete-btn { background: #e53e3e; color: #fff; }
.delete-btn:hover { background: #c53030; }
#roomCount { color: #aaa; font-size: 0.9rem; }

/* Table */
table { width: 100%; border-collapse: collapse; margin-top: 8px; }
th, td { padding: 10px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); }
th { color: #ffd700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
td { font-size: 0.9rem; }
tr:hover { background: rgba(255,255,255,0.03); }
.phase-badge {
  display: inline-block; padding: 2px 10px; border-radius: 10px;
  font-size: 0.75rem; font-weight: bold; text-transform: uppercase;
}
.phase-waiting { background: #4a5568; color: #cbd5e0; }
.phase-peeking { background: #2b6cb0; color: #bee3f8; }
.phase-playing { background: #276749; color: #9ae6b4; }
.phase-dutchFinal { background: #9b2c2c; color: #fed7d7; }
.phase-roundOver { background: #744210; color: #fefcbf; }
.phase-gameOver { background: #553c9a; color: #d6bcfa; }

.empty-state {
  text-align: center; padding: 48px; color: #666; font-size: 1.1rem;
}
.scores { font-size: 0.8rem; color: #aaa; }
.player-list { font-size: 0.85rem; }
.confirm-delete {
  background: #ffd700; color: #1a1a2e; padding: 6px 14px;
  border: none; border-radius: 4px; cursor: pointer; font-weight: bold;
  margin-left: 6px;
}
.cancel-delete {
  background: #4a5568; color: #fff; padding: 6px 14px;
  border: none; border-radius: 4px; cursor: pointer;
  margin-left: 4px;
}
</style>
</head>
<body>
<h1>Admin Panel</h1>
<p class="subtitle">Dutch Card Game - Room Management</p>
<div id="authError">Invalid admin password. Access denied.</div>

<div id="controls">
  <button id="refreshBtn" onclick="loadRooms()">Refresh</button>
  <button id="backBtn" onclick="window.location.href='/'">Back to Game</button>
  <span id="roomCount"></span>
</div>

<div id="content">
  <table>
    <thead>
      <tr>
        <th>Room ID</th>
        <th>Phase</th>
        <th>Players</th>
        <th>Round</th>
        <th>Scores</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="roomsBody"></tbody>
  </table>
  <div id="emptyState" class="empty-state" style="display:none;">No active rooms.</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const password = params.get('p') || '';

async function loadRooms() {
  try {
    const res = await fetch('/admin/rooms?password=' + encodeURIComponent(password));
    if (res.status === 403) {
      document.getElementById('authError').style.display = 'block';
      document.getElementById('content').style.display = 'none';
      return;
    }
    const rooms = await res.json();
    document.getElementById('authError').style.display = 'none';
    document.getElementById('roomCount').textContent = rooms.length + ' active room(s)';

    const tbody = document.getElementById('roomsBody');
    const emptyState = document.getElementById('emptyState');

    if (rooms.length === 0) {
      tbody.innerHTML = '';
      emptyState.style.display = 'block';
      return;
    }
    emptyState.style.display = 'none';

    tbody.innerHTML = rooms.map(r => {
      const scores = Object.entries(r.totalScores || {})
        .map(([name, score]) => `${name}: ${score}`)
        .join(', ');
      return `<tr>
        <td><strong>${escHtml(r.id)}</strong></td>
        <td><span class="phase-badge phase-${r.phase}">${r.phase}</span></td>
        <td class="player-list">${r.players.map(escHtml).join(', ') || '-'}</td>
        <td>${r.roundNumber}/${r.maxRounds}</td>
        <td class="scores">${scores || '-'}</td>
        <td id="actions-${escAttr(r.id)}">
          <button class="delete-btn" onclick="confirmDelete('${escJs(r.id)}')">Delete</button>
        </td>
      </tr>`;
    }).join('');
  } catch (e) {
    console.error(e);
  }
}

function confirmDelete(roomId) {
  const td = document.getElementById('actions-' + roomId);
  if (!td) return;
  td.innerHTML =
    `<span style="color:#ffd700;font-size:0.85rem;">Sure?</span>` +
    `<button class="confirm-delete" onclick="deleteRoom('${escJs(roomId)}')">Yes</button>` +
    `<button class="cancel-delete" onclick="loadRooms()">No</button>`;
}

async function deleteRoom(roomId) {
  try {
    const res = await fetch('/admin/rooms/' + encodeURIComponent(roomId) + '/delete?password=' + encodeURIComponent(password), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }
    });
    if (res.ok) {
      loadRooms();
    }
  } catch (e) {
    console.error(e);
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function escAttr(s) { return s.replace(/[^a-zA-Z0-9_-]/g, '_'); }
function escJs(s) { return s.replace(/'/g, "\\'").replace(/\\/g, "\\\\"); }

// Auto-refresh every 5 seconds
loadRooms();
setInterval(loadRooms, 5000);
</script>
</body>
</html>
